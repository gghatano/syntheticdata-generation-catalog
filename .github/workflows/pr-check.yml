name: PR Check

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'docs/catalog/**'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/catalog/package-lock.json
      - name: Install dependencies
        working-directory: docs/catalog
        run: npm ci
      - name: Lint
        working-directory: docs/catalog
        run: npm run lint
      - name: Test (unit)
        working-directory: docs/catalog
        run: npm test -- --run
      - name: Build
        working-directory: docs/catalog
        run: npm run build
      - name: E2E tests
        working-directory: docs/catalog
        run: npx playwright install --with-deps chromium && npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: docs/catalog/playwright-report/
          retention-days: 7
