name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/catalog/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/catalog/package-lock.json
      - name: Install dependencies
        working-directory: docs/catalog
        run: npm ci
      - name: Lint
        working-directory: docs/catalog
        run: npm run lint
      - name: Test (unit)
        working-directory: docs/catalog
        run: npm test -- --run
      - name: Build
        working-directory: docs/catalog
        run: npm run build
      - name: E2E tests
        working-directory: docs/catalog
        run: npx playwright install --with-deps chromium && npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: docs/catalog/playwright-report/
          retention-days: 7
      # SPA routing fallback: GitHub Pages は未知のパスで 404.html を返す。
      # index.html をコピーしておくことで React Router がルーティングを復元できる。
      # 注: HTTP ステータスは 404 のまま。SEO 上の既知制約は README 参照。
      - name: Copy index.html to 404.html for SPA routing
        run: cp docs/catalog/dist/index.html docs/catalog/dist/404.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/catalog/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
